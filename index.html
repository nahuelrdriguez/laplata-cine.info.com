<style>
  :root{
    --bg:#F7F1EA;

    --line:#E8D6D3;
    --text:#3C2027;
    --text-muted:#8C6E75;
    --color-comercial:#C3536B;
    --color-municipal:#A98F97;
    --color-independiente:#D9663D;
    --font-display:'Fraunces',Georgia,serif;

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--bg-alt);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }

  a{ color:inherit; }

  .hero{
    background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:3rem 1.5rem 2.2rem;
  }

  .hero .contenedor{ max-width:760px; margin:0 auto; }

.eyebrow{
  font-family:'Beau Rivage', cursive;
  font-size:2.6rem;
  font-weight:400;
  text-transform:none;
  letter-spacing:0;
  line-height:1.3;
  color:var(--color-comercial);
  margin:0 0 0.6rem;
}
  

  .swatch{ display:flex; gap:4px; margin:0 0 1rem; }
  .swatch span{ width:28px; height:10px; border-radius:2px; }
  .swatch span:nth-child(1){ background:var(--text); }
  .swatch span:nth-child(2){ background:var(--color-comercial); }
  .swatch span:nth-child(3){ background:var(--color-municipal); }

 .hero h1{
  font-family:'Montserrat', Arial, sans-serif;
  font-weight:900;
  font-style:normal;
  letter-spacing:-0.01em;
  font-size:clamp(2.3rem,7vw,3.4rem);
  line-height:1.05;
  margin:0;
  color:var(--text);
 } 

  .hero .sub{

    color:var(--text-muted);
    margin:0.8rem 0 0;

  }

main.contenedor{

.poster{

}

.poster-izq{ transform:rotate(-2deg); }
.poster-der{ transform:rotate(2deg); }

@media (min-width:1300px){
  .posters{

  .dia-pill.activo{

<script>
  const DIAS_ABREV = ["dom", "lun", "mar", "mié", "jue", "vie", "sáb"];

  function generarDias(cantidad) {
    const hoy = new Date();
    const dias = [];
    for (let i = 0; i < cantidad; i++) {
      const d = new Date(hoy);
      d.setDate(hoy.getDate() + i);
      dias.push({
        indice: d.getDay(),
        etiqueta: i === 0 ? "Hoy" : i === 1 ? "Mañana" : `${DIAS_ABREV[d.getDay()]} ${d.getDate()}`,
      });
    }
    return dias;
  }

  const DIAS = generarDias(7);
  let diaSeleccionado = 0;
  let cinesSeleccionados = new Set();

  function aplicaDia(funcion) {
    if (funcion.dias === "todos") return true;
    return funcion.dias.includes(DIAS[diaSeleccionado].indice);
  }

  function cineDe(id) {
    return CINES.find((c) => c.id === id);
  }
  function resolverPrecio(f, diaSemanaIndice) {
  if (!f.precio) return null;
  if (typeof f.precio === "string") return f.precio;
  const regla = f.precio.find((r) => r.dias.includes(diaSemanaIndice));
  return regla ? regla.precio : null;
  }

  function renderDias() {
    const cont = document.getElementById("dias");
    cont.innerHTML = DIAS.map(
      (d, i) => `<button class="dia-pill ${i === diaSeleccionado ? "activo" : ""}" data-i="${i}">${d.etiqueta}</button>`
    ).join("");
    cont.querySelectorAll("button").forEach((b) => {
      b.addEventListener("click", () => {
        diaSeleccionado = Number(b.dataset.i);
        render();
      });
    });
  }

  function renderCines() {
    const cont = document.getElementById("cines");
    const todosActivo = cinesSeleccionados.size === 0;
    let html = `<button class="cine-pill ${todosActivo ? "activo" : ""}" data-c="__todos__">Todos</button>`;
    html += CINES.map((c) => {
      const activo = cinesSeleccionados.has(c.id);
      return `<button class="cine-pill ${activo ? "activo" : ""}" data-c="${c.id}" style="--tipo-color:var(--color-${c.tipo})">${c.nombre}</button>`;
    }).join("");
    cont.innerHTML = html;
    cont.querySelectorAll("button").forEach((b) => {
      b.addEventListener("click", () => {
        const c = b.dataset.c;
        if (c === "__todos__") {
          cinesSeleccionados.clear();
        } else if (cinesSeleccionados.has(c)) {
          cinesSeleccionados.delete(c);
        } else {
          cinesSeleccionados.add(c);
        }
        render();
      });
    });
  }

  function renderLista() {
    const cont = document.getElementById("lista");
    const filtradas = FUNCIONES.filter(
      (f) => aplicaDia(f) && (cinesSeleccionados.size === 0 || cinesSeleccionados.has(f.cine))
    ).sort((a, b) => a.horarios[0].localeCompare(b.horarios[0]));

    if (filtradas.length === 0) {
      cont.innerHTML = `<p class="vacio">Todavía no hay funciones cargadas para este día.</p>`;
      return;
    }

    cont.innerHTML = filtradas
      .map((f) => {
        const cine = cineDe(f.cine);
        const horarios = f.horarios.map((h) => `<span class="horario">${h}</span>`).join("");
        const metaPartes = [cine.nombre, f.sala, f.ciclo ? `Ciclo ${f.ciclo}` : null].filter(Boolean);
        return `
          <article class="funcion" style="--tipo-color:var(--color-${cine.tipo})">
            <div>
              <p class="etiqueta">${cine.tipo}</p>
              <h3>${f.titulo}</h3>
              <p class="meta">${metaPartes.join(" · ")}</p>
            </div>
            <div class="funcion-horarios">
              ${horarios}
              ${resolverPrecio(f, DIAS[diaSeleccionado].indice) ? `<span class="precio">${resolverPrecio(f, DIAS[diaSeleccionado].indice)}</span>` : ""}
            </div>
          </article>
        `;
      })
      .join("");
  }

  function render() {
    renderDias();
    renderCines();
    renderLista();
  }

  document.getElementById("actualizado").textContent = ULTIMA_ACTUALIZACION;
  render();
</script>
